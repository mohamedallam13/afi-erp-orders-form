<? const AFILogo = "https://drive.google.com/file/d/1uUnkpqwhDzH1tRp7cL9wK604LgSkrRWA/view?usp=drive_link" ?>

<!DOCTYPE html>
<html dir="rtl">

<head>
  <base target="_top">
  <style>
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @page {
      margin: 1cm;
      size: A4;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      color-adjust: exact;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.2;
      color: #333;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Section 1: Header */
    .header-section {
      position: relative;
      text-align: center;
      margin-bottom: 50px;
      /* Increased from 30px */
      min-height: 80px;
    }

    .logo {
      position: absolute;
      left: 0;
      top: 0;
      height: 80px;
    }

    .title-container {
      text-align: center;
      position: relative;
      top: 50px;
      /* Move title down by 20px */
    }

    .document-title {
      background: #000 !important;
      color: white !important;
      padding: 5px 30px;
      display: inline-block;
      font-weight: bold;
      font-size: 1.2rem;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    /* Section 2: Information */
    .info-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .info-column {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 15px;
      align-content: start;
    }

    .info-label {
      font-weight: bold;
      white-space: nowrap;
    }

    .payment-boxes {
      display: flex;
      gap: 15px;
    }

    .payment-box {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .box {
      width: 12px;
      height: 12px;
      border: 1px solid #000;
      display: inline-block;
    }

    .filled-box {
      background-color: #000 !important;
    }

    /* Section 3: Comments */
    .comments-section {
      margin-bottom: 20px;
      text-align: right;
    }

    .comments-content {
      margin-top: 5px;
      white-space: pre-line;
    }

    /* Section 4: Table */
    .table-section {
      flex: 1;
      margin-bottom: 30px;
    }

    .table-title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .order-table {
      width: 100%;
      border-collapse: collapse;
    }

    .order-table th,
    .order-table td {
      border: 1px solid #000;
      padding: 6px;
      text-align: right;
    }

    .order-table th {
      background-color: #f8f9fa !important;
      font-weight: bold;
    }

    .order-table th:nth-child(1) {
      width: 5%;
    }

    .order-table th:nth-child(2) {
      width: 35%;
    }

    .order-table th:nth-child(3) {
      width: 15%;
    }

    .order-table th:nth-child(4) {
      width: 15%;
    }

    .order-table th:nth-child(5) {
      width: 30%;
    }

    /* Section 5: Signatures */
    .signature-section {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
      margin-top: auto;
      padding-top: 20px;
    }

    .signature-box {
      text-align: center;
    }

    .signature-line {
      border-bottom: 1px solid #000;
      margin-bottom: 5px;
      min-height: 25px;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
  <!-- Section 1: Header -->
<div class="header-section">
  <img src="<?!= HELPERS.convertImageToDataUri(AFILogo) ?>" alt="AFI Logo" class="logo">
  <div class="title-container">
    <div class="document-title">
      أمر توريد
      <? if (data.modificationVersion) { ?>
        <span style="margin-right: 5px;">(تعديل)</span>
      <? } ?>
    </div>
  </div>
  <div></div>
</div>

  <div class="main-content">
    <!-- Section 2: Information -->
    <div class="info-section">
      <div class="info-column">
        <div class="info-label">المسلسل:</div>
        <div>
          <?= data.orderSerial ?>
          <? if (data.modificationVersion) { ?>
            <span style="color: #003366; font-weight: bold; margin-right: 5px;">- نسخة <?= data.modificationVersion ?></span>
          <? } ?>
        </div>
        <div class="info-label">التاريخ:</div>
        <div>
          <?= data.orderDate ?>
        </div>
        <div class="info-label">الساعة:</div>
        <div>
          <?= data.orderTime ?>
        </div>
      </div>

      <div class="info-column">
        <div class="info-label">اسم العميل:</div>
        <div>
          <?= data.clientData.name ?>
        </div>
        <div class="info-label">مسؤول البيع:</div>
        <div>
          <?= data.salesPersonData.name ?>
        </div>
        <div class="info-label">نظام التعامل:</div>
        <div class="payment-boxes">
          <div class="payment-box">
            <div class="box <?= data.paymentType === 'cash' ? 'filled-box' : '' ?>"></div>
            <span>كاش</span>
          </div>
          <div class="payment-box">
            <div class="box <?= data.paymentType === 'check' ? 'filled-box' : '' ?>"></div>
            <span>شيك</span>
          </div>
          <div class="payment-box">
            <div class="box <?= data.paymentType === 'credit' ? 'filled-box' : '' ?>"></div>
            <span>آجل</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 3: Comments -->
    <? if (data.generalComments) { ?>
    <div class="comments-section">
      <div class="info-label">ملاحظات عامة:</div>
      <div class="comments-content">
        <?= data.generalComments ?>
      </div>
    </div>
    <? } ?>

    <!-- Section 4: Table -->
    <div class="table-section">
      <div class="table-title">بيان أمر التوريد</div>
      <table class="order-table">
        <thead>
          <tr>
            <th>م</th>
            <th>الصنف</th>
            <th>الكمية</th>
            <th>الوحدة</th>
            <th>ملاحظات</th>
          </tr>
        </thead>
        <tbody>
          <? data.items.forEach(function(item, index) { ?>
          <tr>
            <td>
              <?= index + 1 ?>
            </td>
            <td>
              <?= item.productData.name ?>
            </td>
            <td>
              <?= item.quantity ?>
            </td>
            <td>
              <?= item.unit.name ?>
            </td>
            <td>
              <?= item.item_comment || '' ?>
            </td>
          </tr>
          <? }); ?>
        </tbody>
      </table>
    </div>

    <!-- Section 5: Signatures -->
    <div class="signature-section">
      <div class="signature-box">
        <div class="signature-line"></div>
        <span>توقيع مسؤول البيع</span>
      </div>
      <div class="signature-box">
        <div class="signature-line"></div>
        <span>توقيع المستلم</span>
      </div>
    </div>
  </div>
</body>

</html>
